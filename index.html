<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="cabecalho">
        <h1 class="cabecalho-titulo">Confere aí</h1>
        <nav>
            <a href="#" class="cabecalho-link">Iniciar</a>
        </nav>
    </header>
    <main class="principal">
        <section>
            <article class="cartao">
                <div class="cartao-interno">
                    <div class="cartao-frente">
                        <img src="Gemini_Generated_Image_2a7f6j2a7f6j2a7f.png" alt="Pergunta do flashcard" class="cartao-imagem">
                        <p class="cartao-texto">O modo anônimo do navegador esconde tudo o que você faz na internet.</p>
                    </div>
                    <div class="cartao-verso">
                        <img src="Gemini_Generated_Image_2a7f6j2a7f6j2a7f.png" alt="Resposta do flashcard" class="cartao-imagem">
                        <p class="cartao-texto">MITO! ❌ Ele apenas não salva o histórico no seu aparelho, mas o seu provedor de internet e os sites visitados ainda conseguem ver sua atividade.</p>
                    </div>
                </div>
            </article>
        </section>
    </main>
    <footer class="rodape">
        <p class="rodape-texto">Projeto desenvolvido por Aluna Rafaely</p>
    </footer>

</body>

</html>
